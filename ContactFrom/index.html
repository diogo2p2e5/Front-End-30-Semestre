<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="header">
        <div class = "container container--flex-column">
            <img class="header__logo" 
            src="./images/Vector.svg" 
            alt=""
            >
            <h1 class="header__title">Contact From</h1>
            <p class="header__text">Insira os dados do contato e clique em cadastrar!</p>
        </div>
    </header>

    <main>
        <div class="container">
            <form class="contact-form" action="">

                <!-- //////////////////////////////*NOME E SONBRENOME*//////////////////////////////////////// -->
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__lable" for="nome">Nome</label>
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--metade"
                                name="nome" 
                                id="nome" 
                                placeholder="Nome"
                                type="text"
                        >
                        <input class="contact-form__input contact-form__input--metade"
                                name="sobrenome" 
                                id="sobrenome" 
                                placeholder="Sobrenome"
                                type="text"
                        >    
                    </div>
                </div>
                <!-- //////////////////////////////////////////////////////////////////////////////////// -->

                <!-- ///////////////////////////*EMAIL EMAIL EMAIL*///////////////////////////////////// -->
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__lable" for="Email">Email</label>
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--inteiro"
                                name="Email" 
                                id="email" 
                                placeholder="ex:fulano@gmail.com"
                                type="text"
                        >
                    </div>
                </div>
                <!-- /////////////////////////////////////////////////////////////////////////////////// -->

                 <!-- ///////////////////////////*TELEFONE*//////////////////////////////////////////// -->
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__lable" for="Email">Telefone</label>
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--terco"
                                name="pais" 
                                id="pais" 
                                placeholder="+55"
                                type="text"
                        >

                        <input class="contact-form__input contact-form__input--terco"
                                name="DDD" 
                                id="DDD" 
                                placeholder="ddd"
                                type="text"
                        >

                        <input class="contact-form__input contact-form__input--terco"
                                name="numero" 
                                id="numero" 
                                placeholder="ex: 9999999"
                                type="text"
                        >
                    </div>
                </div>
                <!-- ///////////////////////////////////////////////////////////////////////////////////// -->

                <!-- ////////////////////////////////////*ENDERECO*////////////////////////////////// -->
                    <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__lable" for="Endereco">Endereço</label>
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--quarto"
                                name="cep" 
                                id="cep" 
                                placeholder="cep: 9999-999"
                                type="text"
                        >

                         <input class="contact-form__input contact-form__input--metade"
                                name="rua" 
                                id="rua" 
                                placeholder="Rua Lá de Casa"
                                type="text"
                        > 

                        <input class="contact-form__input contact-form__input--quarto"
                                name="CasaNumero" 
                                id="CasaNumero" 
                                placeholder="ex: 555"
                                type="text"
                        >
                       
                    </div>
                </div>

                 <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__lable" for="Endereco"></label>
                    </div>
                    <div class="contact-form__col-b">
                    <input class="contact-form__input contact-form__input--terco"
                                name="apartamento" 
                                id="apartamento" 
                                placeholder="Apto. 12 Bloco x"
                                type="text"
                        >
                        <input class="contact-form__input contact-form__input--terco"
                                name="Bairro" 
                                id="Bairro" 
                                placeholder="Bairro"
                                type="text"
                        >
                        <input class="contact-form__input contact-form__input--terco"
                                name="Cidade" 
                                id="Cidade" 
                                placeholder="Cidade"
                                type="text"
                        >
                       
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__lable" for="Endereco"></label>
                    </div>
                    <div class="contact-form__col-b">
                     <input class="contact-form__input contact-form__input--terco"
                                name="Estado" 
                                id="Estado" 
                                placeholder="Estado"
                                type="text"
                        >
                       
                    </div>
                </div>

                <!-- //////////////////////////////////////////////////////////////////////////////// -->

                <!-- ////////////////////////////////////ANOTAÇÔES/////////////////////////////////// -->
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__lable" for="Anotacoes">Anotações</label>
                    </div>
                    <div class="contact-form__col-b">
                     <textarea class="contact-form__input contact-form__input--anotacoes"
                        name="Anotacoes" 
                        id="Anotacoes"
                        placeholder="Suas Anotações Aqui">
                    </textarea>
                    </div>
                </div>


                <!-- //////////////////////////////////////////////////////////////////////////////// -->

                    <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                    </div>
                    <div class="contact-form__col-b">

                     <button 
                     type="button"
                     id="cadastrar"
                     name="cadastrar"
                     class="contact-form__button  contact-form__input--metade"
                     onclick="minhaFuncao();"
                     >cadastrar</button>
                    
                     <button 
                    type="reset"
                    type="button"
                     id="limpar"
                     name="limpar"
                     class="contact-form__button  contact-form__input--metade"
                    >Limpar</button>

                    </div>
                </div>



            </form>

            

        </div>
    </main>
    <script>
        function minhaFuncao(){
            let nome = document.getElementById("nome").value.trim();
            let sobrenome = document.getElementById("sobrenome").value.trim();
            let email = document.getElementById("email").value.trim();
            let pais = document.getElementById("pais").value.trim();
            let DDD = document.getElementById("DDD").value.trim();
            let numero = document.getElementById("numero").value.trim();
            let cep = document.getElementById("cep").value.trim();
            let rua = document.getElementById("rua").value.trim();
            let CasaNumero = document.getElementById("CasaNumero").value.trim();
            let apartamento = document.getElementById("apartamento").value.trim();
            let Bairro = document.getElementById("Bairro").value.trim();
            let Cidade = document.getElementById("Cidade").value.trim();
            let Estado = document.getElementById("Estado").value.trim();

            //valida o preenchimento do campo nome
            if(nome.length == 0){//se estiver vazio ele pinta
                formError("nome")
            }else{//se não ele deixa normal
                reiniciaBorder("nome")
            }

            if(sobrenome.length == 0){
                formError("sobrenome")
            }else{//se não ele deixa normal
                reiniciaBorder("sobrenome")
            }

        
             if(email.length == 0){
                formError("email")
            }else{//se não ele deixa normal
                reiniciaBorder("email")
            }

            // ///////////////////////////////////////////////////////////////////////////////////////

             if(pais.length == 0){
                formError("pais")
            }else{//se não ele deixa normal
                reiniciaBorder("pais")
            }

             if(DDD.length == 0){
                formError("DDD")
            }else{//se não ele deixa normal
                reiniciaBorder("DDD")
            }

             if(numero.length == 0){
                formError("numero")
            }else{//se não ele deixa normal
                reiniciaBorder("numero")
            }

            // /////////////////////////////////////////////////////////////////////////////////////////

             if(cep.length == 0){
                formError("cep")
            }else{//se não ele deixa normal
                reiniciaBorder("cep")
            }

             if(rua.length == 0){
                formError("rua")
            }else{//se não ele deixa normal
                reiniciaBorder("rua")
            }

              if(CasaNumero.length == 0){
                formError("CasaNumero")
            }else{//se não ele deixa normal
                reiniciaBorder("CasaNumero")
            }

              if(apartamento.length == 0){
                formError("apartamento")
            }else{//se não ele deixa normal
                reiniciaBorder("apartamento")
            }

              if(rua.length == 0){
                formError("rua")
            }else{//se não ele deixa normal
                reiniciaBorder("rua")
            }

              if(Bairro.length == 0){
                formError("Bairro")
            }else{//se não ele deixa normal
                reiniciaBorder("Bairro")
            }

              if(Cidade.length == 0){
                formError("Cidade")
            }else{//se não ele deixa normal
                reiniciaBorder("Cidade")
            }

              if(Estado.length == 0){
                formError("Estado")
            }else{//se não ele deixa normal
                reiniciaBorder("Estado")
            }


            // literal template: é a crase ``
            // console.log(`Nome: ${nome} ${sobrenome} Email: ${email}`);
        }

        //função que pinta a borda do campo que precissa preencher
        function formError(fildId){

            document.getElementById(fildId).style.border = "1px solid red";
        }

        function reiniciaBorder(fildId){
            document.getElementById(fildId).style.border = "none";
        }


    </script>



</body>
</html>
