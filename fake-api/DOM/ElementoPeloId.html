<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pegar elemento pelo id</title>
</head>
<body>
    <input type="text" id="nome">
    <input type="text" id="sobrenome">
    <button onclick="juntarNome()">Nome e Sobrenome</button>

    <script>
        function juntarNome(){
            const nome = window.document.getElementById("nome");//pega o objeto/html todo
            const sobrenome = window.document.getElementById("sobrenome").value;//pega somente o valor digitado

            // nome = "Diogo";//erro, tentando substituir uma constante



            console.log(nome);
            console.log(sobrenome);
            console.log(nome.value);
            console.log(nome.id);
            nome.value = "Roberto"
        }
    </script>
</body>
</html>
